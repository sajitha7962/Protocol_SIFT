<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Protocol SIFT Frontend Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: rgba(22, 27, 43, 0.78);
        --panel-strong: rgba(37, 41, 58, 0.86);
        --text: #dee1f7;
        --muted: #aeb5c8;
        --line: rgba(173, 198, 255, 0.16);
        --primary: #adc6ff;
        --cyan: #4cd7f6;
        --green: #4edea3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 14% 0%, rgba(76, 215, 246, 0.14), transparent 30%),
          radial-gradient(circle at 100% 8%, rgba(78, 222, 163, 0.12), transparent 26%),
          var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 4;
        border-bottom: 1px solid var(--line);
        background: rgba(11, 16, 32, 0.88);
        backdrop-filter: blur(16px);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        max-width: 1440px;
        margin: 0 auto;
        padding: 16px 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        width: 36px;
        height: 36px;
        border: 1px solid rgba(76, 215, 246, 0.42);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(173, 198, 255, 0.32), rgba(78, 222, 163, 0.12)),
          rgba(22, 27, 43, 0.9);
        box-shadow: 0 0 28px rgba(76, 215, 246, 0.16);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        line-height: 24px;
      }

      .subtitle {
        margin: 2px 0 0;
        color: var(--muted);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
        line-height: 16px;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
        color: var(--green);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
        text-transform: uppercase;
      }

      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 12px rgba(78, 222, 163, 0.7);
      }

      main {
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr);
        gap: 20px;
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }

      nav {
        position: sticky;
        top: 85px;
        align-self: start;
        max-height: calc(100vh - 110px);
        overflow: auto;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        backdrop-filter: blur(16px);
      }

      button {
        width: 100%;
        min-height: 44px;
        margin: 0 0 6px;
        padding: 10px 12px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      button:hover,
      button.active {
        border-color: rgba(76, 215, 246, 0.26);
        background: rgba(76, 215, 246, 0.08);
        color: var(--text);
      }

      button.active {
        box-shadow: inset 3px 0 0 var(--cyan);
      }

      .stage {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel-strong);
        overflow: hidden;
        backdrop-filter: blur(16px);
      }

      .stage-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        font-size: 16px;
        line-height: 24px;
      }

      .path {
        color: var(--muted);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
      }

      .viewport {
        padding: 16px;
        overflow: auto;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: #050814;
      }

      @media (max-width: 860px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        main {
          grid-template-columns: 1fr;
          padding: 16px;
        }

        nav {
          position: static;
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1>Protocol SIFT</h1>
            <p class="subtitle">frontend preview console</p>
          </div>
        </div>
        <div class="status">local preview online</div>
      </div>
    </header>

    <main>
      <nav id="screenList" aria-label="Screens"></nav>
      <section class="stage" aria-live="polite">
        <div class="stage-head">
          <h2 id="screenTitle"></h2>
          <span class="path" id="screenPath"></span>
        </div>
        <div class="viewport">
          <img id="screenImage" alt="" />
        </div>
      </section>
    </main>

    <script>
      const screens = [
        ["Landing Intake With Hero", "protocol_sift_landing_intake_with_hero/screen.png"],
        ["Landing Intake", "protocol_sift_landing_intake/screen.png"],
        ["Dashboard", "protocol_sift_dashboard/screen.png"],
        ["Correlation Dashboard", "protocol_sift_correlation_dashboard/screen.png"],
        ["Findings Explorer", "protocol_sift_findings_explorer/screen.png"],
        ["Threat Intelligence", "protocol_sift_threat_intelligence/screen.png"],
        ["Knowledge Graph", "protocol_sift_knowledge_graph/screen.png"],
        ["Evidence Integrity", "protocol_sift_evidence_integrity/screen.png"],
        ["Agent Monitor", "protocol_sift_agent_monitor/screen.png"],
        ["Agent Reasoning Trace", "protocol_sift_agent_reasoning_trace/screen.png"],
        ["Self Correction Loop", "protocol_sift_self_correction_loop/screen.png"],
        ["MCP Forensic Tools", "protocol_sift_mcp_forensic_tools/screen.png"],
        ["New Case Intake", "protocol_sift_new_case_intake/screen.png"],
        ["Audit Logs", "protocol_sift_audit_logs/screen.png"],
        ["Final Report Preview", "protocol_sift_final_report_preview/screen.png"],
        [
          "Command Center Visualization",
          "futuristic_cybersecurity_command_center_visualization_for_a_landing_page._an_ai/screen.png",
        ],
      ];

      const list = document.querySelector("#screenList");
      const title = document.querySelector("#screenTitle");
      const path = document.querySelector("#screenPath");
      const image = document.querySelector("#screenImage");

      function selectScreen(index) {
        const [name, src] = screens[index];
        title.textContent = name;
        path.textContent = src;
        image.src = src;
        image.alt = name;
        [...list.children].forEach((button, buttonIndex) => {
          button.classList.toggle("active", buttonIndex === index);
        });
      }

      screens.forEach(([name], index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = name;
        button.addEventListener("click", () => selectScreen(index));
        list.appendChild(button);
      });

      selectScreen(0);
    </script>
  </body>
</html>
